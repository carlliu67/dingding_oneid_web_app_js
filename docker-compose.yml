services:
  # 完整服务（前后端+webhook）
  app:
    build: .
    image: dingding-oneid:latest
    container_name: dingding-oneid
    ports:
      - "7000:7000"
      - "7001:7001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # 项目名称，用于生成节点名称
      - COMPOSE_PROJECT_NAME=dingtalk
      # 容器名称，用于标识节点
      - CONTAINER_NAME=dingding-oneid
    restart: unless-stopped
    networks:
      - dingding-network
    volumes:
      - ./config/server:/app/server/config
      - ./config/client:/app/src/config
      - ./logs:/app/logs
      - ./data:/app/data

networks:
  dingding-network:
    driver: bridge